        body {
            font-family: 'Poppins', sans-serif;

            color: var(--text-primary);

        .app-container {

        .sidebar {
            width: var(--sidebar-width);
            background: rgba(0, 0, 0, 0.7);
            position: fixed;
            height: 100vh;
            padding: 20px 0;
            overflow-y: auto;
            border-right: 1px solid rgba(255, 255, 255, 0.1);
            z-index: 1000;
            transition: width 0.3s ease;
        }

        .sidebar-toggle-btn {
            position: absolute;
            top: 10px;
            right: 10px;
            background: none;
            border: none;
            color: var(--text-primary);
            font-size: 24px;
            cursor: pointer;
            z-index: 1010;
        }

        .sidebar-logo {
            padding: 0 20px 20px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            margin-bottom: 20px;
        }

        .logo {
            font-family: 'Montserrat', sans-serif;
            font-size: 28px;
            color: var(--primary);
            text-decoration: none;
            display: flex;
            align-items: center;
            transition: all 0.3s ease;
            text-shadow: 0 0 5px rgba(var(--shadow-primary), 0.5);
        }

        .logo i {
            margin-right: 8px;
            font-size: 24px;
            transition: transform 0.6s cubic-bezier(0.68, -0.55, 0.27, 1.55);
        }

        .sidebar-nav {
            padding: 0 20px;
            margin-bottom: 30px;
        }

        .nav-title {
            text-transform: uppercase;
            font-size: 12px;
            color: var(--text-muted);
            margin-bottom: 15px;
            letter-spacing: 1.5px;
            font-weight: 600;
            transition: opacity 0.3s ease;
        }

        .nav-item {
            display: flex;
            align-items: center;
            padding: 12px 15px;
            color: var(--text-secondary);
            text-decoration: none;
            transition: all 0.3s ease, box-shadow 0.3s;
            border-radius: 8px;
            margin-bottom: 5px;
        }

        .nav-item i {
            margin-right: 15px;
            font-size: 18px;
            width: 24px;
            text-align: center;
            transition: all 0.3s ease;
        }

        .nav-item:hover {
            color: var(--primary);
            background: rgba(var(--shadow-primary), 0.08);
            transform: translateX(5px);
            box-shadow: 0 0 15px rgba(var(--shadow-primary), 0.5);
        }

        .nav-item.active {
            color: var(--primary);
            background: rgba(var(--shadow-primary), 0.1);
            box-shadow: inset 0 0 10px rgba(var(--shadow-primary), 0.5), 0 0 10px rgba(var(--shadow-primary), 0.5);
        }


        /* Main */
        /* .main-content {

        .main-content {
            flex: 1;
            margin-left: var(--sidebar-width);
            padding: 30px;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
            min-height: 100vh;
            transition: margin-left 0.3s ease;
        }

        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            border-bottom: 2px solid rgba(255, 255, 255, 0.1);
            padding-bottom: 10px;
        }

        .section-title {
            font-family: 'Montserrat', sans-serif;
            font-size: 2.5rem;
            font-weight: 700;
            color: var(--text-primary);
            text-shadow: 0 0 5px rgba(0, 0, 0, 0.5);
        }

        .section-title span {
            color: var(--primary);
            text-shadow: 0 0 10px rgba(var(--shadow-primary), 0.8);
        }

        /* Cards */
        .favorites-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 20px;
        }

        .card {
            background: var(--card-bg);
            border-radius: 12px;
            overflow: hidden;
            position: relative;
            transition: 0.3s;
        }

        .card:hover {
            transform: translateY(-5px);
        }

        .card-img {
            width: 100%;
            height: 200px;
            object-fit: cover;
        }

        .card-content {
            padding: 10px;
            text-align: center;
        }

        .card-title {
            color: var(--primary);
        }

        .card-subtitle {
            color: var(--text-muted);
        }

        .favourite-btn {
            width: 35px;
            height: 35px;
            border-radius: 50%;
            border: none;
            cursor: pointer;
            background: rgba(0, 0, 0, 0.7);
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.5);
            transition: transform 0.3s, background 0.3s, box-shadow 0.3s;
        }

        .favourite-btn i {
            color: white;
            font-size: 16px;
        }

        .card.favourited .favourite-btn i {
            color: var(--primary);
        }
    </style>
